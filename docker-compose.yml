services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=urban_admin
      - POSTGRES_PASSWORD=urban_secret
      - POSTGRES_DB=urbanhelper_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - ./backend:/app
    ports:
      - "8080:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=urbanhelper_db
      - DB_USER=urban_admin
      - DB_PASS=urban_secret
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  frontend-citizen:
    build:
      context: ./frontend-citizen
    volumes:
      - ./frontend-citizen:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE=http://localhost:8080
      - VITE_WS_BASE=ws://localhost:8080

  frontend-admin:
    build:
      context: ./frontend-admin
    volumes:
      - ./frontend-admin:/app
      - /app/node_modules
    ports:
      - "3002:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE=http://localhost:8080

volumes:
  postgres_data:
